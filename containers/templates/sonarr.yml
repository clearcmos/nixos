services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=America/New_York
    volumes:
      - ./data:/config
      - /mnt/syno/sonarr/tv:/tv
      - /mnt/syno/sonarr/downloads:/downloads
    network_mode: host